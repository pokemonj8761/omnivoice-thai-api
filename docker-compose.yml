services:
  omnivoice-thai:
    image: aidogs/omnivoice-thai-api:latest   # pull from Docker Hub
    build: .                                   # fallback: build locally
    container_name: omnivoice-thai
    restart: unless-stopped
    ports:
      - "7860:7860"
    environment:
      - OMNIVOICE_MODEL_PATH=/app/model
      - OMNIVOICE_PORT=7860
      - OMNIVOICE_HOST=0.0.0.0
    volumes:
      # Persist generated audio files
      - ./outputs:/app/outputs
      # (Optional) Mount external model to skip baking into image:
      # - ~/omnivoice-thai:/app/model
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    dns:
      - 8.8.8.8
      - 8.8.4.4
    # Wait for model to load before marking as healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7860/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
